version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: punto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: puntoDB
      POSTGRES_USER: punto
      POSTGRES_PASSWORD: punto123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db-schema-postgres.sql:/docker-entrypoint-initdb.d/02-schema.sql
    networks:
      - punto_network

  # pgAdmin para gestión de PostgreSQL
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: punto_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@punto.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - punto_network

  # Redis para cache y Pub/Sub (WebSocket bridge)
  redis:
    image: redis:7-alpine
    container_name: punto_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - punto_network

  # WebSocket server — reemplaza Pusher
  ws:
    build:
      context: ./ws-server
      dockerfile: Dockerfile
    container_name: punto_ws
    restart: unless-stopped
    environment:
      WS_PORT: 6001
      REDIS_URL: redis://redis:6379
    ports:
      - "6001:6001"
    depends_on:
      - redis
    networks:
      - punto_network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  redis_data:
    driver: local

networks:
  punto_network:
    driver: bridge
