<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://api.trello.com/1/client.js?key=0e20aa1d544fdfd506077317bcb542a6&dummy=.js"></script>
</head>
<body>
<div id="loggedout">
    <a id="connectLink" href="#">Connect To Trello</a>
</div>

<div id="loggedin">
    <div id="header">
        Logged in to as <span id="fullName"></span> 
        <a id="disconnect" href="#">Log Out</a>
    </div>
    
    <div id="output"></div>
</div>   

<script>

$(document).ready(function(){
/* 
NOTE: The Trello client library has been included as a Managed Resource.  To include the client library in your own code, you would include jQuery and then

<script src="https://api.trello.com/1/client.js?key=your_application_key">...

See https://trello.com/docs for a list of available API URLs

The API development board is at https://trello.com/api

The &dummy=.js part of the managed resource URL is required per http://doc.jsfiddle.net/basic/introduction.html#add-resources
*/

var onAuthorize = function() {
    updateLoggedIn();
    $("#output").empty();
    
    Trello.members.get("me", function(member){
        $("#fullName").text(member.fullName);
    
        var $cards= $("<div>")
            .text("Loading Cards...")
            .appendTo("#output");

        // Output a list of all of the cards that the member 
        // is assigned to
        Trello.get("members/me/boards", function(cards) {
            $cards.empty();
            $("<div>").text("Click a card to add a comment to it").appendTo($cards);
            
            $.each(cards, function(ix, card) {
                $("<a>")
                .addClass("card")
                .text(card.name)
                .appendTo($cards)
                .click(function(){
                    var plop = Math.random();
                    var color = (plop > 0.7) ? "red" : "green";
                    Trello.put("boards/" + card.id + "/prefs/background", {value: "grey"});
                    setTimeout(function() {
                        Trello.put("boards/" + card.id + "/prefs/background", {value: color});}, 3000);
                })
            });  
        });
    });

};

var updateLoggedIn = function() {
    var isLoggedIn = Trello.authorized();
    $("#loggedout").toggle(!isLoggedIn);
    $("#loggedin").toggle(isLoggedIn);        
};
    
var logout = function() {
    Trello.deauthorize();
    updateLoggedIn();
};
                          
Trello.authorize({
    interactive:false,
    success: onAuthorize
});

$("#connectLink")
.click(function(){
    Trello.authorize({
        type: "popup",
        name: "ENCOM",
        success: onAuthorize,
        scope: { write: true, read: true, account: true },
        key: "0e20aa1d544fdfd506077317bcb542a6"
    })
});
    
$("#disconnect").click(logout);



});
</script> 

</body>
</html>
