<div class="h2 font-thin text-center">Configuración</div>
<div class="text-left panel-body no-padder">
  <div class="col-sm-6">
    <h4>Sucursal:</h4>
    <select name="outlet" id="settingsOutletSelect" class="form-control m-b input-lg">
    </select>
  </div>

  <div class="col-sm-6">
    <h4>Caja:</h4>
    <select name="outlet" id="settingsRegisterSelect" class="form-control m-b-lg input-lg">
    </select>
  </div>
 
  <hr class="bg-dark"/>

  <div class="col-sm-6">
    <h4>Activar control de caja:</h4>
    <div class="switch-select switch" id="drawerControl">
        <div class="swinner"></div>
    </div>

  </div>

  <div class="col-sm-6">
    <h4>Imprimir automáticamente:</h4>
    <div class="switch-select switch" id="autoprint">
        <div class="swinner"></div>
    </div>
  </div>

  <div class="col-sm-6">
    <h4>Venta a crédito:</h4>
    <div class="switch-select switch" id="saleCondition">
        <div class="swinner"></div>
    </div>
  </div>

  <div class="col-sm-6 hidden">
    <h4>Activar registro de firma:</h4>
    <div class="switch-select switch" id="signature">
        <div class="swinner"></div>
    </div>
  </div>

  <a href="#" class="btn btn-block btn-lg btn-danger m-t-lg clickeable col-xs-12" data-type="resetapp">Eliminar Todos los Datos</a>
</div>
